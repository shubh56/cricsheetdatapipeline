name: Nightly Cricket Sync
on:
  schedule:
    - cron: '0 2 * * *' # 2 AM UTC every night
  workflow_dispatch: # Allows you to click a button and run it anytime

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: pip install pandas sqlalchemy psycopg2-binary requests

      - name: Run the script
        env:
          DB_URL: ${{ secrets.DB_URL }}
        run: python update_cricket_data.py
